name: template

services:
  template-mysql:
    image: mysql:8.2
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-template}
      MYSQL_USER: ${MYSQL_USER:-template}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-template}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-template-root}
    volumes:
      - template-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-template-root}"]
      interval: 10s
      timeout: 5s
      retries: 20

  template-server:
    build:
      context: .
      dockerfile: Dockerfile.template-server
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://template-mysql:3306/${MYSQL_DATABASE:-template}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-template}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-template}
      TEMPLATE_SERVER_PORT: 8080
      TEMPLATE_SERVER_TOKEN: ${TEMPLATE_SERVER_TOKEN:-change-me}
      TEMPLATE_NODE_HEARTBEAT_TIMEOUT_SECONDS: ${TEMPLATE_NODE_HEARTBEAT_TIMEOUT_SECONDS:-90}
    depends_on:
      template-mysql:
        condition: service_healthy

  template-web:
    build:
      context: .
      dockerfile: Dockerfile.template-web
      args:
        VITE_API_BASE: ""
    restart: unless-stopped
    ports:
      - "${TEMPLATE_PUBLIC_PORT:-80}:80"
    depends_on:
      template-server:
        condition: service_started

  template-node:
    build:
      context: .
      dockerfile: Dockerfile.template-node
    restart: unless-stopped
    environment:
      TEMPLATE_NODE_PORT: 8090
      TEMPLATE_NODE_NAME: ${TEMPLATE_NODE_NAME:-template-node}
      TEMPLATE_NODE_TYPE: ${TEMPLATE_NODE_TYPE:-server}
      TEMPLATE_NODE_HOST: ${TEMPLATE_NODE_HOST:-localhost}
      TEMPLATE_SERVER_BASE_URL: http://template-server:8080
      TEMPLATE_SERVER_TOKEN: ${TEMPLATE_SERVER_TOKEN:-change-me}
      TEMPLATE_NODE_HEARTBEAT_INTERVAL_MS: ${TEMPLATE_NODE_HEARTBEAT_INTERVAL_MS:-30000}
      TEMPLATE_NODE_HEARTBEAT_INITIAL_DELAY_MS: ${TEMPLATE_NODE_HEARTBEAT_INITIAL_DELAY_MS:-5000}
      TEMPLATE_NODE_STATE_DIR: /workspace/state
      SPRING_APPLICATION_JSON: >-
        {"template":{"node":{"service-probes":[
        {"name":"template-server","kind":"http","target":"http://template-server:8080/api/health","timeoutMs":3000,"expectedStatus":200},
        {"name":"template-web","kind":"http","target":"http://template-web/","timeoutMs":3000,"expectedStatus":200}
        ]}}}
    volumes:
      - ${TEMPLATE_NODE_STATE_HOST_DIR:-./deploy/data/node-state}:/workspace/state
    depends_on:
      template-server:
        condition: service_started
      template-web:
        condition: service_started

volumes:
  template-mysql-data:
