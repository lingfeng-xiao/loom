name: Release

on:
  push:
    branches:
      - main
    paths:
      - apps/loom-server/**
      - apps/loom-web/**
      - apps/loom-node/**
      - packages/contracts/**
      - deploy/**
      - Dockerfile.loom-server
      - Dockerfile.loom-web
      - Dockerfile.loom-node
      - docker-compose.yml
      - .env.example
      - .github/workflows/release.yml

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/loom-server
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/loom-web
  NODE_IMAGE: ghcr.io/${{ github.repository_owner }}/loom-node

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: apps/loom-web/package-lock.json
      - name: Build server
        working-directory: apps/loom-server
        run: sed -i 's/\r$//' mvnw && chmod +x mvnw && ./mvnw -q -DskipTests package
      - name: Build node
        working-directory: apps/loom-node
        run: sed -i 's/\r$//' mvnw && chmod +x mvnw && ./mvnw -q -DskipTests package
      - name: Build web
        working-directory: apps/loom-web
        run: |
          npm ci
          npm run build
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.loom-server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
            ${{ env.SERVER_IMAGE }}:main
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.loom-web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:main
      - name: Build and push node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.loom-node
          push: true
          tags: |
            ${{ env.NODE_IMAGE }}:${{ github.sha }}
            ${{ env.NODE_IMAGE }}:main

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check deploy secrets
        id: deploy-secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          missing=0
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip deploy
        if: steps.deploy-secrets.outputs.ready != 'true'
        run: echo "Deploy secrets are not configured; skipping server deployment."
      - name: Prepare bundle
        if: steps.deploy-secrets.outputs.ready == 'true'
        run: |
          mkdir -p deploy-bundle/scripts
          cp deploy/docker-compose.release.yml deploy-bundle/docker-compose.release.yml
          cp deploy/scripts/remote-deploy.sh deploy-bundle/scripts/remote-deploy.sh
          cp deploy/scripts/remote-smoke-test.sh deploy-bundle/scripts/remote-smoke-test.sh
          chmod +x deploy-bundle/scripts/remote-deploy.sh deploy-bundle/scripts/remote-smoke-test.sh
      - name: Configure SSH
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi
      - name: Upload deploy bundle
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "REMOTE_ROOT='${DEPLOY_ROOT}'; if [ -z \"\$REMOTE_ROOT\" ]; then REMOTE_ROOT=\"\$HOME/loom-deploy\"; fi; mkdir -p \"\$REMOTE_ROOT/scripts\""
          remote_root="${DEPLOY_ROOT:-~/loom-deploy}"
          scp -P "${DEPLOY_PORT:-22}" deploy-bundle/docker-compose.release.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${remote_root}/docker-compose.release.yml"
          scp -P "${DEPLOY_PORT:-22}" deploy-bundle/scripts/remote-deploy.sh "${DEPLOY_USER}@${DEPLOY_HOST}:${remote_root}/scripts/remote-deploy.sh"
          scp -P "${DEPLOY_PORT:-22}" deploy-bundle/scripts/remote-smoke-test.sh "${DEPLOY_USER}@${DEPLOY_HOST}:${remote_root}/scripts/remote-smoke-test.sh"
      - name: Deploy on server
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "REMOTE_ROOT='${DEPLOY_ROOT}'; if [ -z \"\$REMOTE_ROOT\" ]; then REMOTE_ROOT=\"\$HOME/loom-deploy\"; fi; \
             chmod +x \"\$REMOTE_ROOT/scripts/remote-deploy.sh\" \"\$REMOTE_ROOT/scripts/remote-smoke-test.sh\" && \
             export DEPLOY_ROOT=\"\$REMOTE_ROOT\" && \
             export COMPOSE_FILE=\"\$REMOTE_ROOT/docker-compose.release.yml\" && \
             export ENV_FILE=\"\$REMOTE_ROOT/.env\" && \
             export LOOM_SERVER_IMAGE='${SERVER_IMAGE}:${GITHUB_SHA}' && \
             export LOOM_WEB_IMAGE='${WEB_IMAGE}:${GITHUB_SHA}' && \
             export LOOM_NODE_IMAGE='${NODE_IMAGE}:${GITHUB_SHA}' && \
             export GHCR_USERNAME='${GHCR_USERNAME}' && \
             export GHCR_TOKEN='${GHCR_TOKEN}' && \
             \"\$REMOTE_ROOT/scripts/remote-deploy.sh\""
      - name: Smoke test
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          DEPLOY_WEB_URL: ${{ secrets.DEPLOY_WEB_URL }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "REMOTE_ROOT='${DEPLOY_ROOT}'; if [ -z \"\$REMOTE_ROOT\" ]; then REMOTE_ROOT=\"\$HOME/loom-deploy\"; fi; \
             export WEB_URL='${DEPLOY_WEB_URL:-http://127.0.0.1}' && \"\$REMOTE_ROOT/scripts/remote-smoke-test.sh\""
