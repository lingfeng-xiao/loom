name: Release

on:
  push:
    branches:
      - main
    paths:
      - apps/server/**
      - apps/web/**
      - apps/node/**
      - packages/contracts/**
      - deploy/**
      - Dockerfile.template-server
      - Dockerfile.template-web
      - Dockerfile.template-node
      - docker-compose.yml
      - .env.example
      - .github/workflows/release.yml

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/template-server
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/template-web
  NODE_IMAGE: ghcr.io/${{ github.repository_owner }}/template-node

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Check release hygiene
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: bash deploy/scripts/release-preflight.sh

  build-and-push:
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Build server
        working-directory: apps/server
        run: sed -i 's/\r$//' mvnw && chmod +x mvnw && ./mvnw -q -DskipTests package
      - name: Build node
        working-directory: apps/node
        run: sed -i 's/\r$//' mvnw && chmod +x mvnw && ./mvnw -q -DskipTests package
      - name: Build web
        working-directory: apps/web
        run: |
          npm ci
          npm run build
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.template-server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
            ${{ env.SERVER_IMAGE }}:main
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.template-web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:main
      - name: Build and push node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.template-node
          push: true
          tags: |
            ${{ env.NODE_IMAGE }}:${{ github.sha }}
            ${{ env.NODE_IMAGE }}:main

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Check deploy secrets
        id: deploy-secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          missing=0
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_PRIVATE_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip deploy
        if: steps.deploy-secrets.outputs.ready != 'true'
        run: echo "Deploy secrets are not configured; skipping server deployment."
      - name: Prepare bundle
        if: steps.deploy-secrets.outputs.ready == 'true'
        run: |
          mkdir -p deploy-bundle/compose/edge deploy-bundle/scripts deploy-bundle/systemd
          cp deploy/compose/docker-compose.production.yml deploy-bundle/compose/docker-compose.production.yml
          cp deploy/compose/edge/nginx.conf deploy-bundle/compose/edge/nginx.conf
          cp deploy/systemd/template.service deploy-bundle/systemd/template.service
          cp deploy/scripts/remote-*.sh deploy-bundle/scripts/
          chmod +x deploy-bundle/scripts/*.sh
          tar -czf deploy-bundle.tgz -C deploy-bundle .
      - name: Configure SSH
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "$DEPLOY_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi
      - name: Upload deploy bundle
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "STAGE_ROOT='${DEPLOY_ROOT}'; if [ -z \"\$STAGE_ROOT\" ]; then STAGE_ROOT=\"\$HOME/template-deploy\"; fi; rm -rf \"\$STAGE_ROOT/bundle\" && mkdir -p \"\$STAGE_ROOT/bundle\""
          stage_root="${DEPLOY_ROOT:-~/template-deploy}"
          scp -P "${DEPLOY_PORT:-22}" deploy-bundle.tgz "${DEPLOY_USER}@${DEPLOY_HOST}:${stage_root}/deploy-bundle.tgz"
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "STAGE_ROOT='${DEPLOY_ROOT}'; if [ -z \"\$STAGE_ROOT\" ]; then STAGE_ROOT=\"\$HOME/template-deploy\"; fi; tar -xzf \"\$STAGE_ROOT/deploy-bundle.tgz\" -C \"\$STAGE_ROOT/bundle\""
      - name: Deploy on server
        if: steps.deploy-secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "STAGE_ROOT='${DEPLOY_ROOT}'; if [ -z \"\$STAGE_ROOT\" ]; then STAGE_ROOT=\"\$HOME/template-deploy\"; fi; \
             env \
             DEPLOY_STAGE_ROOT=\"\$STAGE_ROOT\" \
             INSTALL_ROOT='/opt/template' \
             TEMPLATE_SERVER_IMAGE='${SERVER_IMAGE}:${GITHUB_SHA}' \
             TEMPLATE_WEB_IMAGE='${WEB_IMAGE}:${GITHUB_SHA}' \
             TEMPLATE_NODE_IMAGE='${NODE_IMAGE}:${GITHUB_SHA}' \
             GHCR_USERNAME='${GHCR_USERNAME}' \
             GHCR_TOKEN='${GHCR_TOKEN}' \
             \"\$STAGE_ROOT/bundle/scripts/remote-release.sh\""
