name: Agent Dispatch

on:
  push:
    paths:
      - '.claude/pending_tasks.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read pending tasks
        id: read-tasks
        run: |
          content=$(cat .claude/pending_tasks.json)
          echo "TASKS_CONTENT<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Found pending tasks, notification will be sent via GitHub Issues"

      - name: Create GitHub Issue for agent notification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASKS_CONTENT: ${{ steps.read-tasks.outputs.tasks_content }}
        run: |
          # Parse tasks and create GitHub Issues for each
          python .claude/hooks/create_tasks_issue.py << 'PYEOF'
          ${{ steps.read-tasks.outputs.tasks_content }}
          PYEOF

      - name: Clear processed tasks
        run: |
          # Reset pending_tasks.json to empty after notification
          echo '{"tasks": []}' > .claude/pending_tasks.json
