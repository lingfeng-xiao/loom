name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check patch formatting
        run: git diff --check

  contracts:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Typecheck shared contracts
        run: npx -p typescript@5.6.3 tsc -p packages/contracts/tsconfig.json --noEmit

  server:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    defaults:
      run:
        working-directory: apps/loom-server
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build server
        run: sed -i 's/\r$//' mvnw && chmod +x mvnw && ./mvnw -q test && ./mvnw -q -DskipTests package

  node:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    defaults:
      run:
        working-directory: apps/loom-node
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run node tests
        run: sed -i 's/\r$//' mvnw && chmod +x mvnw && ./mvnw -q test

  web:
    runs-on: ubuntu-latest
    needs: repo-hygiene
    defaults:
      run:
        working-directory: apps/loom-web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: apps/loom-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  docker-compose:
    runs-on: ubuntu-latest
    needs:
      - contracts
      - server
      - node
      - web
    steps:
      - uses: actions/checkout@v4
      - name: Lint deploy scripts
        run: |
          find deploy/scripts -maxdepth 1 -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Validate compose file
        env:
          LOOM_SERVER_IMAGE: ghcr.io/example/loom-server:test
          LOOM_WEB_IMAGE: ghcr.io/example/loom-web:test
          LOOM_NODE_IMAGE: ghcr.io/example/loom-node:test
        run: |
          docker compose config
          docker compose -f docker-compose.yml -f docker-compose.dev.yml config
          docker compose -f deploy/compose/docker-compose.production.yml config
          docker compose build loom-server loom-web loom-node
