spring:
  application:
    name: loom-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/loom?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:loom}
    password: ${SPRING_DATASOURCE_PASSWORD:loom}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

server:
  port: ${LOOM_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

loom:
  app-name: loom
  description: Projectized AI conversation workspace with a visible trace and configurable capability shell.
  docs-url: https://github.com/lingfeng-xiao/loom
  support-email: loom@example.com
  node:
    heartbeat-timeout-seconds: ${LOOM_NODE_HEARTBEAT_TIMEOUT_SECONDS:90}
    server-token: ${LOOM_SERVER_TOKEN:change-me}
  release:
    install-root: ${LOOM_INSTALL_ROOT:/opt/loom}
    systemd-unit: ${LOOM_SYSTEMD_UNIT:loom.service}
    registry: ${LOOM_REGISTRY:ghcr.io/example}
  llm:
    minimax:
      api-base-url: ${LOOM_MINIMAX_API_BASE_URL:https://api.minimaxi.com/v1}
      api-key: ${LOOM_MINIMAX_API_KEY:}
      model-id: ${LOOM_MINIMAX_MODEL_ID:MiniMax-M2.7}
      display-name: ${LOOM_MINIMAX_DISPLAY_NAME:MiniMax M2.7}
      system-prompt: ${LOOM_MINIMAX_SYSTEM_PROMPT:You are Loom, a careful AI teammate that explains decisions clearly and keeps execution visible.}
      temperature: ${LOOM_MINIMAX_TEMPERATURE:1.0}
      max-tokens: ${LOOM_MINIMAX_MAX_TOKENS:1024}
      timeout-ms: ${LOOM_MINIMAX_TIMEOUT_MS:60000}
