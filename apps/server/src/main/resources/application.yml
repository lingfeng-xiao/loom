spring:
  application:
    name: template-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/template?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:template}
    password: ${SPRING_DATASOURCE_PASSWORD:template}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${TEMPLATE_SERVER_PORT:8080}

template:
  app-name: Template Infrastructure Stack
  description: Generic three-app monorepo template with API, web shell, and node agent.
  docs-url: https://github.com/lingfeng-xiao/template
  support-email: team@example.com
  node:
    heartbeat-timeout-seconds: ${TEMPLATE_NODE_HEARTBEAT_TIMEOUT_SECONDS:90}
    server-token: ${TEMPLATE_SERVER_TOKEN:change-me}
  release:
    install-root: ${TEMPLATE_INSTALL_ROOT:/opt/template}
    systemd-unit: ${TEMPLATE_SYSTEMD_UNIT:template.service}
    registry: ${TEMPLATE_REGISTRY:ghcr.io/example}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
